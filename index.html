<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>Максим & Екатерина — Wedding Day</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#f7f4f0;
  --text:#1f1f1f;
  --muted:#7a7a7a;
  --line:#e7dfd7;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  font-family:'Montserrat',sans-serif;
  overflow-x:hidden;
  color:var(--text);
}

/* PARTICLES */
#particles{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* HEARTS */
#hearts-overlay{
  position:fixed;
  inset:0;
  z-index:9999;
  pointer-events:none;
  overflow:hidden;
}

.heart{
  position:absolute;
  width:24px;
  height:24px;
  opacity:0.85;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
  will-change: transform;
  animation: fall linear forwards;
}

@keyframes fall{
  0%{
    transform:translate(0,-10vh) rotate(0deg);
    opacity:0;
  }
  10%{opacity:1;}
  100%{
    transform:translate(0,110vh) rotate(360deg);
    opacity:0;
  }
}

/* HERO */
.hero{
  min-height:100svh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
  z-index:2;
}

.hero-bg{
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url('./photo.jpg');
  background-size:cover;
  background-position:center;
}

.hero-content{
  position:relative;
  z-index:2;
  color:#fff;
  animation:fadeIn 1.4s ease both;
  text-shadow:0 4px 20px rgba(0,0,0,.5);
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(25px);}
  to{opacity:1;transform:translateY(0);}
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:120px;
  line-height:1;
}

.hero-date{margin-top:15px;font-size:20px;}

section{
  max-width:1100px;
  margin:auto;
  padding:100px 24px;
  position:relative;
  z-index:2;
}

.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

.section-title{
  text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:60px;
  margin-bottom:30px;
}

.invite-text{
  text-align:center;
  font-size:20px;
  line-height:2;
  max-width:750px;
  margin:0 auto;
  color:var(--muted);
}

/* MUSIC */
.music-btn{
  position:fixed;
  top:18px;
  right:18px;
  width:54px;
  height:54px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,.2);
  color:#fff;
  backdrop-filter:blur(10px);
  z-index:10000;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>
<div id="hearts-overlay"></div>

<button class="music-btn" id="musicBtn">♫</button>

<audio id="music" loop>
  <source src="./music/wedding.mp3">
</audio>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <h1>Максим<br>& Екатерина</h1>
    <div class="hero-date">17 июля 2026</div>
  </div>
</section>

<section class="fade">
  <h2 class="section-title">Мы приглашаем вас</h2>
  <p class="invite-text">С большой радостью приглашаем вас разделить с нами самый важный день.</p>
</section>

<script>

/* FADE */
const observer=new IntersectionObserver(e=>{
  e.forEach(i=>{
    if(i.isIntersecting) i.target.classList.add('show');
  });
},{threshold:0.2});

document.querySelectorAll('.fade').forEach(e=>observer.observe(e));

/* MUSIC FIX */
const music=document.getElementById('music');
const btn=document.getElementById('musicBtn');

let unlocked=false;

function unlockAudio(){
  if(unlocked) return;
  unlocked=true;

  music.play().then(()=>{
    btn.textContent='❚❚';
  }).catch(()=> unlocked=false);
}

['click','touchstart','scroll','keydown']
.forEach(e=>window.addEventListener(e,unlockAudio,{once:true,passive:true}));

btn.onclick=async()=>{
  if(music.paused){
    await music.play();
    btn.textContent='❚❚';
  }else{
    music.pause();
    btn.textContent='♫';
  }
};

/* PARTICLES */
const c=document.getElementById('particles');
const ctx=c.getContext('2d');

function resize(){
  c.width=innerWidth;
  c.height=innerHeight;
}
resize();
addEventListener('resize',resize);

let dots=Array.from({length:50},()=>({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  r:Math.random()*1.5
}));

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  dots.forEach(d=>{
    d.y-=0.25;
    if(d.y<0)d.y=c.height;
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle="rgba(201,164,106,.5)";
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

/* HEARTS FIXED */
const overlay=document.getElementById('hearts-overlay');

function createHeart(){
  const h=document.createElement('div');
  h.className='heart';

  const size=14+Math.random()*18;

  h.style.left=Math.random()*100+'vw';
  h.style.width=size+'px';
  h.style.height=size+'px';

  const drift=(Math.random()*80-40)+'px';
  h.style.setProperty('--drift',drift);

  const duration=6000+Math.random()*6000;
  h.style.animationDuration=duration+'ms';

  h.innerHTML=`
  <svg viewBox="0 0 32 29">
    <path d="M23.6 0c-2.7 0-5.2 1.4-6.6 3.6C15.6 1.4 13.1 0 10.4 0 4.6 0 0 4.6 0 10.4c0 6.9 6.2 10.8 15.3 18.2.4.3.9.3 1.3 0C25.8 21.2 32 17.3 32 10.4 32 4.6 27.4 0 21.6 0h2z"
    fill="rgba(255,120,160,.85)"/>
  </svg>`;

  overlay.appendChild(h);

  setTimeout(()=>h.remove(),duration+200);
}

setInterval(createHeart,300);

</script>

</body>
</html>
