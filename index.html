<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Максим & Екатерина — Wedding Day</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --gold:#c9a46a;
  --bg:#f7f4f0;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  overflow-x:hidden;
  font-family:'Montserrat',sans-serif;
}

/* ===== CANVAS ===== */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* ===== HERO ===== */
.hero{
  height:100svh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* PARALLAX BACKGROUND */
.hero-bg{
  position:absolute;
  inset:-20%;
  background:
    radial-gradient(circle at center, rgba(0,0,0,.2), rgba(0,0,0,.7)),
    url('./photo.jpg');
  background-size:cover;
  background-position:center;
  transform:scale(1.1);
  filter:contrast(1.05) saturate(1.1);
}

/* VIGNETTE */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, transparent 40%, rgba(0,0,0,.55));
  z-index:1;
}

/* TEXT */
.hero-content{
  position:relative;
  z-index:2;
  color:white;
}

.subtitle{
  letter-spacing:6px;
  text-transform:uppercase;
  opacity:0;
  animation:fadeUp 1.2s ease forwards;
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:140px;
  opacity:0;
  animation:fadeUp 1.4s ease forwards .3s;
  text-shadow:0 20px 60px rgba(0,0,0,.5);
}

.hero-date{
  opacity:0;
  animation:fadeUp 1.4s ease forwards .6s;
}

/* CINEMATIC ANIMATION */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(40px);
    filter:blur(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
    filter:blur(0);
  }
}

/* ===== GOLD PARTICLES ===== */
.gold-dot{
  position:absolute;
  width:3px;
  height:3px;
  background:var(--gold);
  border-radius:50%;
  opacity:.6;
  box-shadow:0 0 10px var(--gold);
}

/* ===== MUSIC ===== */
.music-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:54px;
  height:54px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,.15);
  color:white;
  backdrop-filter:blur(10px);
  z-index:999;
}

/* ===== SECTION ===== */
section{
  max-width:1100px;
  margin:auto;
  padding:100px 20px;
  position:relative;
  z-index:2;
}

.title{
  font-family:'Cormorant Garamond',serif;
  font-size:64px;
  text-align:center;
}

/* FADE */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1.2s ease;
}
.fade.show{
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<canvas id="gold"></canvas>

<button class="music-btn" id="musicBtn">♫</button>

<audio id="music" loop>
  <source src="./music/wedding.mp3">
</audio>

<div class="hero">

  <div class="hero-bg" id="bg"></div>

  <div class="hero-content">
    <div class="subtitle">wedding day</div>
    <h1>Максим<br>& Екатерина</h1>
    <div class="hero-date">17 июля 2026</div>
  </div>

</div>

<section class="fade">
  <div class="title">Мы приглашаем вас</div>
</section>

<section class="fade">
  <div class="title">До свадьбы</div>
</section>

<script>

/* ===== FADE ===== */
const io=new IntersectionObserver(e=>{
  e.forEach(x=>x.isIntersecting&&x.target.classList.add("show"));
},{threshold:.2});

document.querySelectorAll(".fade").forEach(e=>io.observe(e));

/* ===== MUSIC ===== */
const music=document.getElementById("music");
const btn=document.getElementById("musicBtn");

document.addEventListener("click",()=>music.play().catch(()=>{}),{once:true});

btn.onclick=()=>{
  if(music.paused){music.play();btn.innerHTML="♫";}
  else{music.pause();btn.innerHTML="⏸";}
};

/* ===== PARALLAX ===== */
window.addEventListener("scroll",()=>{
  document.getElementById("bg").style.transform=
    `translateY(${window.scrollY*0.3}px) scale(1.1)`;
});

/* ===== GOLD PARTICLES ===== */
const c=document.getElementById("gold");
const ctx=c.getContext("2d");

function resize(){
  c.width=innerWidth;
  c.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

const p=[];
for(let i=0;i<80;i++){
  p.push({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    r:Math.random()*2,
    d:(Math.random()*0.6)+0.2
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  for(let i=0;i<p.length;i++){
    let s=p[i];

    s.y-=s.d;
    if(s.y<0)s.y=innerHeight;

    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="rgba(201,164,106,0.7)";
    ctx.shadowBlur=10;
    ctx.shadowColor="#c9a46a";
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
