<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>Максим & Екатерина — Wedding Day</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#f7f4f0;
  --text:#1f1f1f;
  --muted:#7a7a7a;
  --accent:#c3a58f;
  --line:#e7dfd7;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  font-family:'Montserrat',sans-serif;
  color:var(--text);
  overflow-x:hidden;
}

/* PARTICLES */
#particles{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* HERO */
.hero{
  min-height:100svh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

.hero-bg{
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url('./photo.jpg');
  background-size:cover;
  background-position:center;
  animation:zoom 18s ease-in-out infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1.05);}
  to{transform:scale(1.12);}
}

.hero-content{
  position:relative;
  z-index:2;
  color:#fff;
  animation:fadeIn 1.6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:130px;
  line-height:1;
}

.hero-date{
  margin-top:20px;
  font-size:20px;
  letter-spacing:2px;
}

/* MUSIC */
.music-btn{
  position:fixed;
  top:18px;
  right:18px;
  width:54px;
  height:54px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,.2);
  color:#fff;
  z-index:999;
  backdrop-filter:blur(10px);
}

/* SECTIONS */
section{
  max-width:1100px;
  margin:auto;
  padding:110px 24px;
  position:relative;
  z-index:2;
}

.section-title{
  text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:64px;
}

/* INVITE */
.invite-text{
  text-align:center;
  color:var(--muted);
  font-size:18px;
  line-height:2;
  max-width:700px;
  margin:20px auto;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-top:50px;
}

.card{
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

/* RSVP */
form{
  max-width:600px;
  margin:40px auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

input,textarea{
  padding:14px;
  border:1px solid var(--line);
  border-radius:10px;
}

button.submit{
  padding:14px;
  border:none;
  background:#000;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}

/* BUTTONS */
.buttons{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:25px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 18px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#fff;
  text-decoration:none;
  color:#000;
}

/* FADE */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

/* MOBILE */
@media(max-width:900px){
  h1{font-size:80px;}
  .section-title{font-size:40px;}
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<button class="music-btn" id="musicBtn">♫</button>

<audio id="music" loop>
  <source src="./music/wedding.mp3">
</audio>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">
    <h1>Максим<br>& Екатерина</h1>
    <div class="hero-date">17 июля 2026</div>
  </div>
</section>

<!-- INVITE -->
<section class="fade">
  <h2 class="section-title">Мы приглашаем вас</h2>

  <p class="invite-text">
    С огромной радостью приглашаем вас разделить с нами один из самых счастливых дней нашей жизни.
  </p>

  <div class="buttons">
    <a class="btn"
       href="https://t.me/Dolotchenko"
       target="_blank">
      Написать в Telegram
    </a>
  </div>
</section>

<!-- RSVP -->
<section class="fade">
  <h2 class="section-title">RSVP</h2>

  <form>
    <input placeholder="Ваше имя">
    <input placeholder="Email">
    <textarea rows="4" placeholder="Сообщение"></textarea>
    <button class="submit" type="button">Отправить</button>
  </form>
</section>

<footer style="text-align:center;padding:50px;color:#777">
  Максим & Екатерина — 2026
</footer>

<script>

/* FADE */
const obs=new IntersectionObserver(e=>{
  e.forEach(i=>i.isIntersecting&&i.target.classList.add('show'))
},{threshold:0.2});

document.querySelectorAll('.fade').forEach(e=>obs.observe(e));

/* MUSIC */
const music=document.getElementById('music');
const btn=document.getElementById('musicBtn');

document.addEventListener('click',()=>music.play().catch(()=>{}),{once:true});

btn.onclick=()=>{
  music.paused?music.play():music.pause();
};

/* PARTICLES */
const c=document.getElementById('particles');
const x=c.getContext('2d');

function r(){
  c.width=innerWidth;
  c.height=innerHeight;
}
r();addEventListener('resize',r);

const p=Array.from({length:60},()=>({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  r:Math.random()*1.6
}));

function a(){
  x.clearRect(0,0,c.width,c.height);

  p.forEach(d=>{
    d.y-=0.3;
    if(d.y<0)d.y=c.height;

    x.beginPath();
    x.arc(d.x,d.y,d.r,0,7);
    x.fillStyle="rgba(201,164,106,.5)";
    x.fill();
  });

  requestAnimationFrame(a);
}
a();

</script>

</body>
</html>
