<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>Максим & Екатерина — Wedding Day</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#f7f4f0;
  --text:#1f1f1f;
  --muted:#7a7a7a;
  --line:#e7dfd7;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  font-family:'Montserrat',sans-serif;
  overflow-x:hidden;
  color:var(--text);
}

/* PARTICLES BEHIND EVERYTHING */
#particles{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* HERO */
.hero{
  min-height:100svh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

.hero-bg{
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url('./photo.jpg');
  background-size:cover;
  background-position:center;
}

.hero-content{
  position:relative;
  z-index:2;
  color:#fff;
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:120px;
  line-height:1;
}

.hero-date{
  margin-top:15px;
  font-size:20px;
}

/* SECTIONS */
section{
  max-width:1100px;
  margin:auto;
  padding:100px 24px;
  position:relative;
  z-index:2;
}

.section-title{
  text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:60px;
  margin-bottom:20px;
}

/* INVITE TEXT (УЛУЧШЕН) */
.invite-text{
  text-align:center;
  font-size:20px;
  line-height:2;
  max-width:750px;
  margin:0 auto;
  color:var(--muted);
}

.invite-text strong{
  color:#000;
  font-weight:500;
}

/* RSVP CARD (ИСПРАВЛЕНО) */
.rsvp-card{
  max-width:600px;
  margin:40px auto 0;
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
  position:relative;
  z-index:3;
}

.rsvp-title{
  text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:34px;
  margin-bottom:15px;
}

.rsvp-phone{
  text-align:center;
  margin-bottom:25px;
  font-size:16px;
  color:#444;
}

.rsvp-phone a{
  color:#000;
  text-decoration:none;
  font-weight:500;
}

form{
  display:flex;
  flex-direction:column;
  gap:12px;
}

input,textarea{
  padding:14px;
  border:1px solid var(--line);
  border-radius:10px;
  font-family:inherit;
}

button{
  padding:14px;
  border:none;
  border-radius:10px;
  background:#000;
  color:#fff;
  cursor:pointer;
}

/* FADE */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

/* MOBILE */
@media(max-width:900px){
  h1{font-size:78px;}
  .section-title{font-size:40px;}
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">
    <h1>Максим<br>& Екатерина</h1>
    <div class="hero-date">17 июля 2026</div>
  </div>
</section>

<!-- INVITE -->
<section class="fade">
  <h2 class="section-title">Мы приглашаем вас</h2>

  <p class="invite-text">
    С большой радостью приглашаем вас разделить с нами <strong>самый важный и счастливый день нашей жизни</strong> —
    день, который станет началом нашей семьи.
  </p>
</section>

<!-- RSVP -->
<section class="fade">

  <h2 class="section-title">RSVP</h2>

  <div class="rsvp-card">

    <div class="rsvp-title">Подтвердите участие</div>

    <div class="rsvp-phone">
      Связь с нами: <a href="tel:+79273379400">+7 (927) 337-94-00</a>
    </div>

    <form>
      <input type="text" placeholder="Ваше имя">
      <input type="email" placeholder="Email">
      <textarea rows="4" placeholder="Сообщение"></textarea>
      <button type="button">Отправить</button>
    </form>

  </div>
</section>

<footer style="text-align:center;padding:50px;color:#777">
  Максим & Екатерина — 2026
</footer>

<script>

/* FADE */
const observer=new IntersectionObserver(e=>{
  e.forEach(i=>{
    if(i.isIntersecting) i.target.classList.add('show');
  });
},{threshold:0.2});

document.querySelectorAll('.fade').forEach(e=>observer.observe(e));

/* PARTICLES */
const c=document.getElementById("particles");
const ctx=c.getContext("2d");

function resize(){
  c.width=innerWidth;
  c.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const dots=Array.from({length:50},()=>({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  r:Math.random()*1.5
}));

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  dots.forEach(d=>{
    d.y-=0.25;
    if(d.y<0)d.y=c.height;

    ctx.beginPath();
    ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle="rgba(201,164,106,.5)";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
