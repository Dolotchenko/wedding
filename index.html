<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Максим & Екатерина — Wedding Day</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f7f4f0;
      --text:#1f1f1f;
      --muted:#7a7a7a;
      --accent:#c3a58f;
      --line:#e7dfd7;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Inter', sans-serif;
      overflow-x:hidden;
    }

    section{
      max-width:1100px;
      margin:auto;
      padding:110px 24px;
    }

    /* HERO */
    .hero{
      min-height:100svh;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      overflow:hidden;
    }

    .hero-bg{
      position:absolute;
      inset:0;
      background:
        linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
        url('./photo.jpg');
      background-size:cover;
      background-position:center 30%;
      transform:scale(1.05);
      animation:zoom 18s ease-in-out infinite alternate;
    }

    @keyframes zoom{
      from{transform:scale(1.05);}
      to{transform:scale(1.12);}
    }

    .hero-content{
      position:relative;
      z-index:2;
      color:white;

      /* ✅ ВОТ ТУТ МЯГКО ОПУСКАЕМ ТЕКСТ БЕЗ ЛОМА ВЕРСТКИ */
      padding-top:120px;
    }

    h1{
      font-family:'Great Vibes', cursive;
      font-size:130px;
      font-weight:400;
      line-height:.9;
      text-shadow:0 10px 30px rgba(0,0,0,.3);
    }

    .subtitle{
      letter-spacing:6px;
      text-transform:uppercase;
      font-size:12px;
      margin-bottom:22px;
      opacity:.9;
    }

    .hero-date{
      margin-top:25px;
      font-size:20px;
      letter-spacing:2px;
    }

    .hero-line{
      width:1px;
      height:80px;
      background:rgba(255,255,255,.5);
      margin:30px auto 0;
    }

    /* MUSIC */
    .music-btn{
      position:fixed;
      top:18px;
      right:18px;
      z-index:999;
      width:54px;
      height:54px;
      border-radius:50%;
      border:none;
      background:rgba(255,255,255,.2);
      backdrop-filter:blur(10px);
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    /* TITLES */
    .section-title{
      font-family:'Playfair Display', serif;
      font-size:56px;
      text-align:center;
      margin-bottom:20px;
    }

    .section-text{
      text-align:center;
      color:var(--muted);
      max-width:700px;
      margin:auto;
      line-height:1.8;
    }

    /* CARDS */
    .cards{
      margin-top:60px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:24px;
    }

    .card{
      background:rgba(255,255,255,.75);
      backdrop-filter:blur(12px);
      border-radius:26px;
      padding:36px;
      transition:.4s ease;
    }

    .card:hover{
      transform:translateY(-8px);
    }

    .card h3{
      font-family:'Playfair Display', serif;
      font-size:32px;
      margin-bottom:10px;
    }

    .card p{
      color:var(--muted);
      line-height:1.7;
    }

    /* TIMELINE */
    .timeline-item{
      display:flex;
      gap:30px;
      padding:20px 0;
      border-bottom:1px solid var(--line);
    }

    .time{
      color:var(--accent);
      min-width:90px;
    }

    .event{
      font-family:'Playfair Display', serif;
      font-size:22px;
    }

    /* COUNTDOWN */
    .countdown{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-top:50px;
    }

    .count-box{
      width:120px;
      height:120px;
      border-radius:50%;
      background:white;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }

    .count-box span{
      font-size:38px;
      font-family:'Playfair Display', serif;
    }

    .count-box small{
      color:var(--muted);
    }

    /* FADE */
    .fade{
      opacity:0;
      transform:translateY(40px);
      transition:1s ease;
    }

    .fade.show{
      opacity:1;
      transform:translateY(0);
    }

    /* MOBILE */
    @media(max-width:768px){
      h1{
        font-size:72px;
      }

      .hero-content{
        padding-top:90px; /* ✅ ещё чуть ниже на мобилке */
      }

      .hero-bg{
        background-position:center 25%;
      }

      .section-title{
        font-size:40px;
      }
    }
  </style>
</head>

<body>

<button class="music-btn" id="musicBtn">♫</button>

<audio id="music" loop>
  <source src="./music/wedding.mp3" type="audio/mpeg">
</audio>

<section class="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">
    <div class="subtitle">wedding day</div>

    <h1>Максим<br>& Екатерина</h1>

    <div class="hero-date">17 июля 2026</div>

    <div class="hero-line"></div>
  </div>
</section>

<section class="fade">
  <h2 class="section-title">Мы приглашаем вас</h2>
</section>

<section class="fade">
  <h2 class="section-title">Программа дня</h2>
</section>

<section class="fade">
  <h2 class="section-title">До свадьбы</h2>

  <div class="countdown">
    <div class="count-box"><span id="days">0</span><small>дней</small></div>
    <div class="count-box"><span id="hours">0</span><small>часов</small></div>
    <div class="count-box"><span id="minutes">0</span><small>минут</small></div>
  </div>
</section>

<section class="fade">
  <h2 class="section-title">RSVP</h2>

  <form>
    <input type="text" placeholder="Имя">
    <input type="email" placeholder="Email">
    <textarea rows="4" placeholder="Сообщение"></textarea>
    <button class="submit">Отправить</button>
  </form>
</section>

<script>
  // fade
  const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting) e.target.classList.add('show');
    });
  },{threshold:0.2});

  document.querySelectorAll('.fade').forEach(el=>observer.observe(el));

  // countdown
  const weddingDate = new Date("July 17, 2026 14:00:00").getTime();

  setInterval(()=>{
    const now = new Date().getTime();
    const d = weddingDate - now;

    document.getElementById('days').innerText = Math.floor(d/(1000*60*60*24));
    document.getElementById('hours').innerText = Math.floor((d%(1000*60*60*24))/(1000*60*60));
    document.getElementById('minutes').innerText = Math.floor((d%(1000*60*60))/(1000*60));
  },1000);

  // music
  const music = document.getElementById('music');
  const btn = document.getElementById('musicBtn');

  music.volume = 0.5;

  function tryPlay(){
    music.play().catch(()=>{
      const start=()=>{
        music.play();
        document.removeEventListener('click',start);
        document.removeEventListener('touchstart',start);
      };
      document.addEventListener('click',start);
      document.addEventListener('touchstart',start);
    });
  }

  document.addEventListener('DOMContentLoaded', tryPlay);

  btn.addEventListener('click',()=>{
    if(music.paused){
      music.play();
      btn.innerHTML='♫';
    } else {
      music.pause();
      btn.innerHTML='⏸';
    }
  });
</script>

</body>
</html>
