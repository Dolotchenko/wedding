<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>Максим & Екатерина — Wedding Day</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#f7f4f0;
  --text:#1f1f1f;
  --muted:#7a7a7a;
  --gold:#b08a66;
  --line:#e7dfd7;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  font-family:'Montserrat',sans-serif;
  overflow-x:hidden;
  color:var(--text);
}

/* PARTICLES */
#particles{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* HEARTS */
#hearts-overlay{
  position:fixed;
  inset:0;
  z-index:9999;
  pointer-events:none;
  overflow:hidden;
}

.heart{
  position:absolute;
  width:22px;
  height:22px;
  opacity:0.85;
  animation:fall linear forwards;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
}

.heart svg{
  width:100%;
  height:100%;
}

@keyframes fall{
  0%{transform:translate(0,-10vh) rotate(0deg);opacity:0;}
  10%{opacity:1;}
  50%{transform:translate(35px,55vh) rotate(180deg);}
  100%{transform:translate(-25px,110vh) rotate(360deg);opacity:0;}
}

/* HERO */
.hero{
  min-height:100svh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
  z-index:2;
}

.hero-bg{
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url('./photo.jpg');
  background-size:cover;
  background-position:center;
}

.hero-content{
  position:relative;
  z-index:2;
  color:#fff;
  animation:fadeIn 1.4s ease both;
  text-shadow:0 4px 20px rgba(0,0,0,.5);
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(25px);}
  to{opacity:1;transform:translateY(0);}
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:120px;
  line-height:1;
}

/* INVITE */
.invite-heading{
  text-align:center;
  font-size:34px;
  font-family:'Cormorant Garamond',serif;
  font-weight:500;

  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 1.2s ease forwards;

  margin-bottom:20px;
}

.invite-heading::after{
  content:"";
  display:block;
  width:120px;
  height:2px;
  margin:12px auto 0;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

/* BOX */
.invite-box{
  max-width:800px;
  margin:0 auto;
  padding:30px 35px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(10px);
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);

  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1.5s ease 0.3s forwards;
  position:relative;
}

/* 💛 ЗОЛОТИСТЫЙ ТЕКСТ + АНИМАЦИЯ */
.invite-box p{
  font-size:20px;
  line-height:1.9;
  text-align:center;

  color:var(--gold);

  animation:goldGlow 4s ease-in-out infinite;
}

.invite-box::before{
  content:"❦";
  position:absolute;
  top:-14px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  color:var(--gold);
  background:var(--bg);
  padding:0 10px;
}

/* glow animation */
@keyframes goldGlow{
  0%{
    text-shadow:0 0 0 rgba(176,138,102,0);
  }
  50%{
    text-shadow:0 0 10px rgba(176,138,102,0.35);
  }
  100%{
    text-shadow:0 0 0 rgba(176,138,102,0);
  }
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(25px);}
  to{opacity:1;transform:translateY(0);}
}

/* SECTIONS */
section{
  max-width:1100px;
  margin:auto;
  padding:100px 24px;
  position:relative;
  z-index:2;
}

.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

.section-title{
  text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:60px;
  margin-bottom:30px;
  font-weight:500;
}

/* MUSIC */
.music-btn{
  position:fixed;
  top:18px;
  right:18px;
  width:54px;
  height:54px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,.2);
  color:#fff;
  backdrop-filter:blur(10px);
  z-index:10000;
}

@media(max-width:900px){
  h1{font-size:80px;}
  .section-title{font-size:40px;}
}

</style>
</head>

<body>

<canvas id="particles"></canvas>
<div id="hearts-overlay"></div>

<button class="music-btn" id="musicBtn">♫</button>

<audio id="music" loop>
  <source src="./music/wedding.mp3">
</audio>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">
    <h1>Максим<br>& Екатерина</h1>
    <div class="hero-date">17 июля 2026</div>
  </div>
</section>

<!-- INVITE -->
<section class="fade">

  <h2 class="invite-heading">
    Дорогие Андрей, Юлия и Александр
  </h2>

  <div class="invite-box">
    <p>
      С большой радостью приглашаем вас разделить с нами один из самых счастливых дней нашей жизни —
      день рождения нашей семьи. Будем рады видеть вас рядом в этот особенный момент.
    </p>
  </div>

</section>

<script>

/* FADE */
const observer=new IntersectionObserver(e=>{
  e.forEach(i=>{
    if(i.isIntersecting) i.target.classList.add('show');
  });
},{threshold:0.2});

document.querySelectorAll('.fade').forEach(e=>observer.observe(e));

/* MUSIC — старт по скроллу (один раз) */
const music=document.getElementById('music');
let started=false;

function startMusic(){
  if(started) return;
  started=true;

  music.play().catch(()=> started=false);
}

window.addEventListener('scroll',startMusic,{passive:true});
window.addEventListener('wheel',startMusic,{passive:true});
window.addEventListener('touchmove',startMusic,{passive:true});

/* BUTTON */
const btn=document.getElementById('musicBtn');

btn.onclick=async()=>{
  if(music.paused){
    await music.play();
    btn.textContent='❚❚';
  }else{
    music.pause();
    btn.textContent='♫';
  }
};

/* HEARTS */
const overlay=document.getElementById('hearts-overlay');

function createHeart(){
  const h=document.createElement('div');
  h.className='heart';

  const size=14+Math.random()*18;
  const left=Math.random()*100;
  const duration=7+Math.random()*12;

  const colors=['#ff8fb1','#ffb3c7','#ffd1dc','#ffc0cb'];

  h.style.left=left+'vw';
  h.style.width=size+'px';
  h.style.height=size+'px';
  h.style.animationDuration=duration+'s';

  h.innerHTML=`
  <svg viewBox="0 0 32 29">
    <path d="M23.6 0c-2.7 0-5.2 1.4-6.6 3.6C15.6 1.4 13.1 0 10.4 0 4.6 0 0 4.6 0 10.4c0 6.9 6.2 10.8 15.3 18.2.4.3.9.3 1.3 0C25.8 21.2 32 17.3 32 10.4 32 4.6 27.4 0 21.6 0h2z"
    fill="${colors[Math.floor(Math.random()*colors.length)]}"/>
  </svg>
  `;

  overlay.appendChild(h);
  setTimeout(()=>h.remove(),20000);
}

setInterval(createHeart,350);

</script>

</body>
</html>
